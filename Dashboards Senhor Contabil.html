<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Rotativo Looker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100vh; border: none; display: block; }

        #fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 9999;
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            backdrop-filter: blur(4px);
            transition: opacity 3s ease;
        }
        #fullscreen-btn.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<iframe id="display-frame" src="" allowfullscreen></iframe>
<button id="fullscreen-btn">⛶ Tela Cheia</button>

<script>
    const dashboards = [
        "https://lookerstudio.google.com/embed/reporting/70097cb5-fc0e-4a8b-81f7-b3e9029594d4/page/ih0nF",
        "https://lookerstudio.google.com/embed/reporting/2645061d-238e-4e37-b29b-df3428a00ddb/page/eDcoF",
        "https://lookerstudio.google.com/embed/reporting/beeb15e8-8bd7-43aa-b5d2-82d3be7c36a4/page/eDcoF",
	"https://lookerstudio.google.com/embed/reporting/4f69a8d8-74cf-4cab-a8f1-26afce35b034/page/p_0355fsfgyd",
	"https://lookerstudio.google.com/embed/reporting/a81593e3-dcf8-4996-b094-7b302ec8e06f/page/p_bozyiu9n1d",
    ];

    const tempoTroca = 10000;
    let index = 0;
    const frame = document.getElementById('display-frame');
    const btn = document.getElementById('fullscreen-btn');

    // --- TELA CHEIA ---
    function entrarTelaCheia() {
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
        else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    // Tenta entrar em tela cheia automaticamente ao carregar
    window.addEventListener('load', () => {
        entrarTelaCheia();
        // Esconde o botão após 4 segundos
        setTimeout(() => btn.classList.add('hidden'), 4000);
    });

    // Botão manual (caso o auto seja bloqueado pelo navegador)
    btn.addEventListener('click', () => {
        entrarTelaCheia();
        btn.classList.add('hidden');
    });

    // Reexibe botão ao mover o mouse
    document.addEventListener('mousemove', () => {
        btn.classList.remove('hidden');
        clearTimeout(btn._hideTimer);
        btn._hideTimer = setTimeout(() => btn.classList.add('hidden'), 4000);
    });

    // --- ROTAÇÃO ---
    function rotacionar() {
        frame.src = dashboards[index];
        index = (index + 1) % dashboards.length;
    }

    rotacionar();
    setInterval(rotacionar, tempoTroca);
</script>
</body>
</html>
